<ion-content [fullscreen]="true">
  <div class="auth-container">
    <ion-card class="auth-card">
      <ion-card-header class="auth-header">
        <ion-card-title class="brand-title">Create Account</ion-card-title>
        <p class="subtitle">Join our platform to get started</p>
      </ion-card-header>

      <ion-card-content>
        <div class="form-group">
          <ion-label class="form-label select-role-label">Select Your Role</ion-label>
          <ion-segment [value]="selectedRole" (ionChange)="selectedRole = $any($event).detail.value" class="role-segment">
            <ion-segment-button value="influencer">
              <ion-label>Influencer</ion-label>
            </ion-segment-button>
            <ion-segment-button value="brand">
              <ion-label>Brand</ion-label>
            </ion-segment-button>
          </ion-segment>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <ion-item lines="none" class="form-item">
            <ion-label position="stacked" class="form-label">Email Address</ion-label>
            <ion-input
              formControlName="email"
              type="email"
              placeholder="name@example.com"
              class="custom-input"
            ></ion-input>
          </ion-item>

          <ion-text color="danger" class="error-msg-text" *ngIf="errorMsg">
            <p class="error-msg">{{ errorMsg }}</p>
          </ion-text>

          <ion-button
            type="submit"
            expand="block"
            class="auth-btn"
            [disabled]="registerForm.invalid || isLoading"
          >
            {{ isLoading ? 'Sending OTP...' : 'Send Verification Code' }}
          </ion-button>
        </form>

        <div class="auth-footer">
          <ion-text color="medium">
            <p>Already have an account? <a routerLink="/login" class="signin-link">Sign In</a></p>
          </ion-text>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
